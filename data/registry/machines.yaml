          capacity: 10000
          usage: 32
        multiplier: { duration: 1.0, output: 1.0, eu: 1.0 }

      - block_id: 51
        name: steam_macerator
        energy_type: STEAM
        tier: 0
        role: consumer
        slots: { input: 2, output: 2 }
        energy:
          capacity: 10000
          usage: 32
        multiplier: { duration: 0.8, output: 1.0, eu: 1.0 }

  # ── Compressor ───────────────────────────────────────────
