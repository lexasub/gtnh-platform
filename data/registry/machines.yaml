# GTNH Platform — Machine Registry
# Defines energy types, machine classes, and their block variants.
#
# Each machine class groups variants that share the same recipe pool.
# Variants differ by energy type, tier, and performance multipliers.
#
# Recipe matching: when a machine queries for recipes, the system:
#   1. Looks up machine class by block_id
#   2. Filters recipes by the variant's energy_type + tier range
#   3. Applies variant multiplier to base recipe values

energy_types:
  # Heat: basic combustion/thermal
  - type: HEAT
    label: "HU"
    tiers: [0]

  # Steam: pressurized steam power
  - type: STEAM
    label: "SU"
    tiers: [0, 1]

  # Electricity: voltage tiers
  - type: ELECTRICITY
    label: "EU"
    tiers: [0, 1, 2, 3, 4, 5]

machine_classes:

  # ── Furnace ──────────────────────────────────────────────
  - class: furnace
    variants:
      - block_id: 36
        name: heat_furnace
        energy_type: HEAT
        tier: 0
        role: consumer
        slots: { input: 1, output: 1 }
        energy:
          capacity: 10000
          usage: 32
        multiplier: { duration: 1.0, output: 1.0, eu: 1.0 }

  # ── Macerator ────────────────────────────────────────────
  - class: macerator
    variants:
      - block_id: 48
        name: heat_macerator
        energy_type: HEAT
        tier: 0
        role: consumer
        slots: { input: 1, output: 1 }
